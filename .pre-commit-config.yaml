repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-json
      - id: pretty-format-json
        args: ["--autofix"]
      - id: check-yaml
  - repo: local
    hooks:
      - id: go-fmt
        name: go-fmt
        language: system
        entry: bash -c 'go fmt ./...'
        pass_filenames: false
        always_run: true
      - id: go-vet
        name: go-vet
        language: system
        entry: bash -c 'go vet ./...'
        pass_filenames: false
        always_run: true
      - id: go-mod-tidy
        name: go-mod-tidy
        language: system
        entry: bash -c 'go mod tidy && git add go.mod go.sum'
        pass_filenames: false
        always_run: true
      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: bash -c 'golangci-lint run ./...'
        pass_filenames: false
        always_run: true
