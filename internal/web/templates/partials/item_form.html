{{define "item_form"}}
<div class="item-form">
  <form hx-post="/api/items"
        hx-target="#items-tbody"
        hx-swap="afterbegin"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <div class="form-row">
      <select name="type" required>
        <option value="EXPENSE" {{if and .Prefill (eq .Prefill.Type "EXPENSE")}}selected{{end}}>Expense</option>
        <option value="INCOME"  {{if and .Prefill (eq .Prefill.Type "INCOME")}}selected{{end}}>Income</option>
      </select>
      <input type="text"   name="name"   placeholder="Description" required style="flex:1;min-width:140px"
             value="{{if .Prefill}}{{.Prefill.Name}}{{end}}">
      <input type="number" name="amount" placeholder="Amount" step="0.01" min="0" required style="width:110px"
             value="{{if .Prefill}}{{printf "%.2f" .Prefill.Amount}}{{end}}">
      <input type="date"   name="date"   required
             value="{{if .Prefill}}{{.Prefill.Date}}{{end}}">
      <select name="category" required>
        <option value="">Category</option>
        {{range .Categories}}
        <option value="{{.Name}}" {{if and $.Prefill (eq $.Prefill.Category .Name)}}selected{{end}}>{{.Name}}</option>
        {{end}}
      </select>
      <button type="submit" class="btn btn-primary">Add</button>
    </div>
  </form>
</div>
{{end}}
