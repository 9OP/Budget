{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget</title>

  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/static/css/style.css">
  <script>
    (function() {
      var t = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/toast.js" defer></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">Budget</a>
    <div class="nav-links">
      <a href="/{{if .Month}}?month={{.Month}}{{end}}"           class="nav-link{{if eq .ActivePage "dashboard"}} active{{end}}">Dashboard</a>
      <a href="/items{{if .Month}}?month={{.Month}}{{end}}"      class="nav-link{{if eq .ActivePage "items"}}     active{{end}}">Items</a>
      <a href="/budgets{{if .Month}}?month={{.Month}}{{end}}"    class="nav-link{{if eq .ActivePage "budgets"}}   active{{end}}">Budgets</a>
      <a href="/categories" class="nav-link{{if eq .ActivePage "categories"}} active{{end}}">Categories</a>
      <a href="/trends"     class="nav-link{{if eq .ActivePage "trends"}}    active{{end}}">Trends</a>
    </div>
    <div class="nav-actions">
      <span class="nav-user">{{.CurrentUser.Email}}</span>
      <form method="post" action="/auth/logout" style="display:contents">
        <button type="submit" class="nav-theme-toggle" title="Sign out" aria-label="Sign out">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </form>
      <button id="theme-toggle" class="nav-theme-toggle" onclick="toggleTheme()"
              title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12"    y1="1"     x2="12"    y2="3"/>
          <line x1="12"    y1="21"    x2="12"    y2="23"/>
          <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"     y1="12"    x2="3"     y2="12"/>
          <line x1="21"    y1="12"    x2="23"    y2="12"/>
          <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <main class="main">
    {{template "content" .}}
  </main>

  <div id="toast-container" aria-live="polite"></div>

</body>
</html>
{{end}}
